services:
  - type: web
    name: smartaqua-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false                 # Set in Render dashboard
      - key: SUPABASE_URL
        sync: false                 # Set in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false                 # Set in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false                 # Set in Render dashboard
      - key: RAZORPAY_KEY_ID
        sync: false                 # Set in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false                 # Set in Render dashboard
      - key: GEMINI_API_KEY
        sync: false                 # Set in Render dashboard
